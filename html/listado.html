<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Listado de restaurantes</title>

  <link rel="stylesheet" href="../css/listado.css" />
  <script src="../js/listado.js" defer></script>
</head>

<body>
  <header class="topbar">
    <div class="wrap topbar__row">
      <a class="brand" href="buscar.html" aria-label="Volver a búsqueda">
        <span class="brand__icon" aria-hidden="true">🍴</span>
        <span class="brand__text">JUST EAT</span>
      </a>

      <form id="miniSearch" class="mini" action="listado.html" method="get">
        <label class="sr-only" for="q2">Dirección</label>
        <input id="q2" name="q" type="search" placeholder="Calle Santa Eulalia 2, Mérida" />
        <button class="btn btn--primary" type="submit">Buscar</button>
      </form>

      <div class="chips" aria-label="Tipo de entrega">
        <button class="chip chip--active" type="button" data-delivery="entrega">Entrega</button>
        <button class="chip" type="button" data-delivery="recogida">Recogida</button>
      </div>

      <a class="toplink" href="IniSesion.html">Inicia sesión</a>
      <button class="iconbtn" type="button" aria-label="Menú">☰</button>
    </div>
  </header>

  <main class="wrap layout" id="main">
    <!-- ASIDE FILTROS -->
    <aside class="filters" aria-label="Filtros">
      <h2 class="h2">Filtros</h2>

      <div class="filter">
        <label class="toggle">
          <input id="f_open" type="checkbox" />
          <span>Abiertos ahora</span>
        </label>
      </div>

      <div class="filter">
        <p class="filter__title">Puntuación</p>
        <div class="radios">
          <label class="radio"><input type="radio" name="rate" value="" checked> Cualquiera</label>
          <label class="radio"><input type="radio" name="rate" value="4"> 4+ ⭐</label>
          <label class="radio"><input type="radio" name="rate" value="4.5"> 4.5+ ⭐</label>
        </div>
      </div>

      <div class="filter">
        <p class="filter__title">Categorías</p>
        <div class="checks" id="catChecks">
          <!-- JS inserta checkboxes -->
        </div>
      </div>

      <button id="btnClear" class="btn btn--ghost" type="button">Limpiar filtros</button>
    </aside>

    <!-- CONTENIDO -->
    <section class="content" aria-label="Resultados de búsqueda">
      <header class="head">
        <div>
          <h1 class="h1" id="resultTitle">Restaurantes</h1>
          <p class="help" id="resultInfo">Resultados (simulado)</p>
        </div>

        <div class="tools">
          <label class="sr-only" for="nameSearch">Buscar restaurante</label>
          <input id="nameSearch" class="tools__search" type="search" placeholder="¿Buscas restaurante?" />

          <label class="sr-only" for="sortSel">Ordenar</label>
          <select id="sortSel" class="tools__select">
            <option value="relevancia" selected>Ordenar: Relevancia</option>
            <option value="rating">Ordenar: Mejor puntuación</option>
            <option value="time">Ordenar: Menor tiempo</option>
            <option value="fee">Ordenar: Menor envío</option>
          </select>
        </div>
      </header>

      <!-- Barra de categorías (tipo carrusel) -->
      <nav class="catbar" aria-label="Categorías rápidas" id="catBar">
        <!-- JS inserta chips -->
      </nav>

      <ul class="list" id="restList" aria-label="Listado de restaurantes">
        <!-- JS inserta cards -->
      </ul>
    </section>
  </main>
</body>
</html>
